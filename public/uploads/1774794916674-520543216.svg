      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spout2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbcfe8;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#f9a8d4;stop-opacity:0.5" />
