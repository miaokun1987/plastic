<svg width="800" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pouch1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pouch2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fed7aa;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#fdba74;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="#fef7ed"/>
  <circle cx="400" cy="400" r="250" fill="#fff" opacity="0.5"/>
  <g transform="translate(400, 400)">
    <rect x="-150" y="-180" width="300" height="360" rx="15" fill="url(#pouch1)" opacity="0.15"/>
    <rect x="-140" y="-170" width="280" height="340" rx="12" fill="url(#pouch2)"/>
    <rect x="-140" y="-170" width="280" height="60" rx="10" fill="#fff" opacity="0.4"/>
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#ea580c" font-weight="bold">LAY FLAT POUCH</text>
    <text x="0" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#9a3412">平口袋</text>
    <ellipse cx="0" cy="180" rx="140" ry="20" fill="#ea580c" opacity="0.2"/>
  </g>
  <text x="400" y="750" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#9a3412" font-weight="bold">食品级平口袋包装</text>
</svg>
