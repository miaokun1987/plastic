<svg width="800" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="zipper1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="zipper2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bbf7d0;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#86efac;stop-opacity:0.5" />
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="#f0fdf4"/>
  <circle cx="400" cy="400" r="250" fill="#fff" opacity="0.5"/>
  <g transform="translate(400, 400)">
    <rect x="-130" y="-170" width="260" height="340" rx="10" fill="url(#zipper1)" opacity="0.15"/>
    <rect x="-120" y="-160" width="240" height="320" rx="8" fill="url(#zipper2)"/>
    <rect x="-120" y="-160" width="240" height="40" rx="6" fill="#fff" opacity="0.5"/>
    <line x1="-100" y1="-140" x2="100" y2="-140" stroke="#16a34a" stroke-width="3" stroke-dasharray="5,3"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#16a34a" font-weight="bold">ZIPPER POUCH</text>
    <text x="0" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#14532d">拉链袋</text>
    <ellipse cx="0" cy="170" rx="120" ry="15" fill="#16a34a" opacity="0.2"/>
  </g>
  <text x="400" y="750" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#14532d" font-weight="bold">可重复密封拉链袋</text>
</svg>
