<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f4f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e7eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  
  <!-- 中心产品框 -->
  <rect x="250" y="100" width="300" height="250" rx="12" fill="white" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#9ca3af">产品示意图区域</text>
  <text x="400" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#d1d5db">800 x 500 px</text>
  
  <!-- 装饰元素 - 左上角 -->
  <circle cx="100" cy="80" r="40" fill="#3b82f6" opacity="0.1"/>
  <circle cx="150" cy="120" r="20" fill="#2563eb" opacity="0.15"/>
  
  <!-- 装饰元素 - 右下角 -->
  <circle cx="700" cy="420" r="50" fill="#2563eb" opacity="0.1"/>
  <circle cx="650" cy="380" r="25" fill="#3b82f6" opacity="0.15"/>
  
  <!-- 尺寸标注线 - 顶部 -->
  <line x1="250" y1="60" x2="550" y2="60" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="250" y1="55" x2="250" y2="65" stroke="#9ca3af" stroke-width="1"/>
  <line x1="550" y1="55" x2="550" y2="65" stroke="#9ca3af" stroke-width="1"/>
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af">300px</text>
  
  <!-- 尺寸标注线 - 左侧 -->
  <line x1="230" y1="100" x2="230" y2="350" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="225" y1="100" x2="235" y2="100" stroke="#9ca3af" stroke-width="1"/>
  <line x1="225" y1="350" x2="235" y2="350" stroke="#9ca3af" stroke-width="1"/>
  <text x="210" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" transform="rotate(-90, 210, 230)">250px</text>
  
  <!-- 底部说明文字 -->
  <text x="400" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#6b7280" font-weight="bold">产品包装示意图</text>
  <text x="400" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9ca3af">Product Packaging Diagram</text>
  
  <!-- 图标占位 -->
  <rect x="320" y="470" width="60" height="20" rx="4" fill="#d1d5db" opacity="0.5"/>
  <rect x="420" y="470" width="60" height="20" rx="4" fill="#d1d5db" opacity="0.5"/>
  
  <!-- 网格线 -->
  <g stroke="#e5e7eb" stroke-width="1" opacity="0.3">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>
</svg>
